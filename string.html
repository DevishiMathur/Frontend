<html>
  <body>
    <h1>Javascript strings</h1>
    <p id="demo"></p>
    <script>
      let firstName = "Devishi";
      let lastName = "Mathur";
      let text = `Welcome ${firstName}, ${lastName}!`;

      document.getElementById("demo").innerHTML = text;
    </script>
    Hello! This is a JavaScript code.<br />
    The starting letters of every word is:
    <div id="output"></div>

    <script>
      const strArray = ["Hello!", "This", "is", "a", "JavaScript", "code"];
      const mapped = strArray.map((item) => item[0]);

      document.getElementById("output").textContent = mapped.join(" ");
    </script>
  </body>
</html>
